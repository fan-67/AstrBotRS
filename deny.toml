[advisories]
vulnerability = "deny"
unmaintained = "warn"
notice = "warn"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
]
deny = []
unlicensed = "deny"

[bans]
multiple-versions = "warn"
wildcards = "denay"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
